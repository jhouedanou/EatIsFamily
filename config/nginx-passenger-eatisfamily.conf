## ✅ Vérifications après déploiement

```bash
# 1. Test SSL
curl -I https://eafafamily.fr

# 2. Vérifier Passenger
passenger-status

# 3. Vérifier les logs
sudo tail -f /var/log/nginx/eafafamily-error.log

# 4. Test de performance
ab -n 100 -c 10 https://eafafamily.fr/

# 5. Vérifier les headers de sécurité
curl -I https://eafafamily.fr | grep -E "(Strict-Transport|X-Frame|Content-Security)"
```

