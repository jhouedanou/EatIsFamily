## 📈 Optimisations recommandées

1. **CDN** : Utiliser Cloudflare ou BunnyCDN
2. **Cache** : Ajouter Redis pour les sessions
3. **Compression d'images** : Intégrer au build
4. **Rate limiting** : Ajouter `limit_req` pour l'API
5. **Monitoring** : Configurer New Relic ou Datadog

