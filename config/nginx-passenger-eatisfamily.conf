## 🔄 Redémarrage et redeploiement

```bash
# Redémarrer l'application sans redémarrer Nginx
touch /var/www/eafafamily/tmp/restart.txt

# Rechargement complet
sudo systemctl reload nginx

# Redémarrage complet
sudo systemctl restart nginx
```

---

## 🐛 Dépannage

### Passenger ne démarre pas

```bash
# Vérifier l'installation
passenger-config about ruby-command

# Lancer en debug
passenger-status --verbose
```

### 502 Bad Gateway

```bash
# Vérifier que Node.js est lancé
ps aux | grep node

# Vérifier les logs Passenger
sudo cat /var/log/nginx/eafafamily-error.log

# Relancer
touch /var/www/eafafamily/tmp/restart.txt
```

### Certificat expire bientôt

```bash
# Renouveler manuellement
sudo certbot renew --force-renewal
```

