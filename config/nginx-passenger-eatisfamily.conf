## 🚀 Installation et activation

```bash
# 1. Copier la configuration
sudo nano /etc/nginx/sites-available/eafafamily
# Coller le contenu ci-dessus et sauvegarder (Ctrl+X, Y, Enter)

# 2. Vérifier la syntaxe
sudo nginx -t

# 3. Activer le site
sudo ln -s /etc/nginx/sites-available/eafafamily /etc/nginx/sites-enabled/

# 4. Désactiver la config par défaut (optionnel)
sudo rm /etc/nginx/sites-enabled/default

# 5. Redémarrer Nginx
sudo systemctl restart nginx

# 6. Vérifier le statut
sudo systemctl status nginx
```

---

## 🔐 Configuration SSL Let's Encrypt

```bash
# Installer certbot
sudo apt-get install certbot python3-certbot-nginx

# Générer le certificat
sudo certbot certonly --nginx -d eafafamily.fr -d www.eafafamily.fr

# Renouvellement automatique (crontab)
sudo crontab -e
# Ajouter: 0 3 * * * /usr/bin/certbot renew --quiet && /usr/sbin/service nginx reload
```

