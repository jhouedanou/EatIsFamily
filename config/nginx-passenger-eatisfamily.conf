# Nginx + Phusion Passenger Configuration pour Eat Is Family

Cette configuration complète est prête pour la production.

## 📋 Fichier: `/etc/nginx/sites-available/eatisfamily`

```nginx
# Redirection HTTP -> HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name eafafamily.fr www.eafafamily.fr;
    
    # Certificat Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
    
    # Redirection HTTPS
    return 301 https://$server_name$request_uri;
}

# Configuration HTTPS principale
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name eafafamily.fr www.eafafamily.fr;
    
    # Logs
    access_log /var/log/nginx/eafafamily-access.log combined;
    error_log /var/log/nginx/eafafamily-error.log warn;
    
    # ===== SSL Configuration =====
    ssl_certificate /etc/letsencrypt/live/eafafamily.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/eafafamily.fr/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    # HSTS (strict transport security)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    
    # ===== Passenger Configuration =====
    passenger_enabled on;
    passenger_app_type node;
    passenger_nodejs /usr/bin/node;
    passenger_startup_file .output/server/index.mjs;
    passenger_app_root /var/www/eafafamily;
    
    # Performance tuning
    passenger_pool_idle_time 300;
    passenger_max_pool_size 10;
    passenger_min_instances 2;
    
    # Timeouts
    passenger_timeout 180;
    send_timeout 180;
    proxy_connect_timeout 180;
    
    # Root - Pas géré par Passenger, fichiers statiques
    root /var/www/eafafamily/.output/public;
    
    # ===== Static Files Caching =====
    
    # Cache agressif pour _nuxt (assets avec hash)
    location ~* ^/_nuxt/.*\.(js|css|png|jpg|jpeg|gif|svg|woff|woff2|ttf|eot)$ {
        expires 365d;
        add_header Cache-Control "public, immutable";
    }
    
    # Cache pour images
    location ~* ^/images/.*\.(png|jpg|jpeg|gif|svg|webp)$ {
        expires 30d;
        add_header Cache-Control "public, must-revalidate";
    }
    
    # Cache pour fonts
    location ~* ^/fonts/.*\.(woff|woff2|ttf|eot|otf)$ {
        expires 365d;
        add_header Cache-Control "public, immutable";
    }
    
    # Favicons et manifests
    location ~ ^/(favicon\.ico|apple-touch-icon\.png|site\.webmanifest)$ {
        expires 30d;
        add_header Cache-Control "public, must-revalidate";
    }
    
    # ===== Gzip Compression =====
    gzip on;
    gzip_types text/plain text/css text/xml text/javascript 
               application/javascript application/json application/xml+rss;
    gzip_comp_level 6;
    gzip_vary on;
    gzip_disable "msie6";
    
    # ===== Security Headers =====
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    
    # CSP pour Eat Is Family
    add_header Content-Security-Policy "
        default-src 'self';
        script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net;
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        img-src 'self' data: https: blob:;
        font-src 'self' data: https://fonts.gstatic.com;
        connect-src 'self' https://eafafamily.fr https://www.eafafamily.fr;
        frame-ancestors 'self';
    " always;
    
    # ===== Routing =====
    
    # API routes (si proxy vers WordPress)
    location /api/ {
        # Peut être proxifié vers WordPress
        # proxy_pass http://wordpress-backend;
        # passenger gère tout
    }
    
    # Page d'erreur personnalisée
    error_page 404 /404.html;
    error_page 500 502 503 504 /500.html;
    
    location ~ \.(html)$ {
        try_files $uri =404;
    }
    
    # ===== Directives utiles =====
    
    # Refuser l'accès aux fichiers de config
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}
```

